<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolveIT - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                    }
                }
            }
        }
    </script>
    <script>
        // Load theme
        const theme = localStorage.getItem("theme") || "system";

        if (theme === "dark" || 
           (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
        }

        function setTheme(mode) {
            localStorage.setItem("theme", mode);

            if (mode === "dark") {
                document.documentElement.classList.add("dark");
            } else if (mode === "light") {
                document.documentElement.classList.remove("dark");
            } else {
                // system
                if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                    document.documentElement.classList.add("dark");
                } else {
                    document.documentElement.classList.remove("dark");
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 flex items-center justify-center min-h-screen p-6 transition-colors duration-200">

    <!-- Theme Toggle -->
    <div class="fixed top-6 right-6 flex items-center gap-2">
        <button onclick="setTheme('light')" class="px-2 py-1 border rounded bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">☀️</button>
        <button onclick="setTheme('dark')" class="px-2 py-1 border rounded bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">🌙</button>
        <button onclick="setTheme('system')" class="px-2 py-1 border rounded bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">💻</button>
    </div>

    <div class="bg-white dark:bg-gray-800 p-10 rounded-xl shadow-lg w-full max-w-md border dark:border-gray-700">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-lg text-white font-bold text-xl mb-4">R</div>
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white">ResolveIT</h2>
            <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in to your account</p>
        </div>

        <form action="/auth/login" method="post" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@company.com"
                    class="w-full p-2.5 border rounded-lg bg-gray-50 dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••"
                    class="w-full p-2.5 border rounded-lg bg-gray-50 dark:bg-gray-700 border-gray-300 dark:border-gray-600 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
                Sign In
            </button>
        </form>

        <!-- Error/Success Messages -->
        <div id="alertContainer" class="mt-4 hidden">
            <p id="alertMsg" class="text-center text-sm font-medium py-2 px-3 rounded-lg"></p>
        </div>

        <div class="mt-8 pt-6 border-t dark:border-gray-700 text-center text-sm">
            <span class="text-gray-500 dark:text-gray-400">Don't have an account?</span>
            <a href="/register" class="text-blue-600 hover:text-blue-500 font-semibold ml-1">Create one</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const success = params.get('success');
        const alertContainer = document.getElementById('alertContainer');
        const alertMsg = document.getElementById('alertMsg');

        if (error) {
            alertContainer.classList.remove('hidden');
            alertMsg.classList.add('bg-red-50', 'text-red-600', 'dark:bg-red-900/20', 'dark:text-red-400');
            alertMsg.textContent = error;
        } else if (success) {
            alertContainer.classList.remove('hidden');
            alertMsg.classList.add('bg-green-50', 'text-green-600', 'dark:bg-green-900/20', 'dark:text-green-400');
            alertMsg.textContent = success;
        }
    </script>
</body>
</html>
