<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - ResolveIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { brand: { 50: '#f0f7ff', 100: '#e0effe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a8a' } }
                }
            }
        }
    </script>
    <script>
        const theme = localStorage.getItem("theme") || "system";
        if (theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
        }
    </script>
    <style>
        .confetti { position: fixed; width: 8px; height: 8px; z-index: 1000; animation: fall linear forwards; border-radius: 2px; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-6 transition-colors duration-300 font-sans">
    <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-[2.5rem] border border-gray-100 dark:border-slate-800 shadow-2xl p-12 text-center space-y-10 relative overflow-hidden">
        <!-- Success Icon -->
        <div class="relative inline-block">
            <div class="w-24 h-24 bg-blue-100 dark:bg-blue-900/30 rounded-3xl flex items-center justify-center text-5xl animate-bounce shadow-xl shadow-blue-500/10">✨</div>
            <div class="absolute -top-2 -right-2 w-8 h-8 bg-green-500 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center text-white text-xs font-bold">✓</div>
        </div>

        <div class="space-y-3">
            <h1 class="text-3xl font-black tracking-tight text-gray-900 dark:text-white">Submission Successful</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-relaxed">Your grievance has been securely logged and assigned a tracking ID. Our team is already on it.</p>
        </div>

        <div class="space-y-4">
            <div class="flex items-center gap-4 p-5 rounded-2xl bg-gray-50 dark:bg-slate-950/50 border border-gray-100 dark:border-slate-800 transition-all hover:border-blue-200 dark:hover:border-blue-900/40">
                <div class="w-3 h-3 rounded-full bg-blue-600 animate-pulse"></div>
                <div class="text-left">
                    <p class="text-[10px] font-black uppercase tracking-widest text-blue-600">ID Generated</p>
                    <p class="text-xs font-bold text-gray-500">Live tracking enabled</p>
                </div>
            </div>
            <div class="flex items-center gap-4 p-5 rounded-2xl bg-gray-50 dark:bg-slate-950/50 border border-gray-100 dark:border-slate-800 opacity-60">
                <div class="w-3 h-3 rounded-full bg-gray-300"></div>
                <div class="text-left">
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400">Officer Assignment</p>
                    <p class="text-xs font-bold text-gray-400">Estimated: 1.2h</p>
                </div>
            </div>
        </div>

        <div class="flex gap-4 pt-4">
            <a href="/" class="flex-1 py-4 px-6 bg-gray-100 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-all">Home</a>
            <a id="trackLink" href="/my-complaints" class="flex-1 py-4 px-6 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-blue-500/25 active:scale-95 transition-all">Track Status</a>
        </div>
    </div>

    <script>
        // Update Track Status link with userId if present
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('userId');
        if (userId) {
            document.getElementById('trackLink').href = '/my-complaints?userId=' + userId;
        }

        // Professional Particle Confetti
        const colors = ['#2563eb', '#3b82f6', '#10b981', '#6366f1', '#4f46e5'];
        for (let i = 0; i < 60; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = '-10px';
            c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            c.style.width = (Math.random() * 6 + 4) + 'px';
            c.style.height = c.style.width;
            c.style.opacity = Math.random() * 0.7 + 0.3;
            c.style.delay = Math.random() * 2 + 's';
            document.body.appendChild(c);
        }
    </script>
</body>
</html>
