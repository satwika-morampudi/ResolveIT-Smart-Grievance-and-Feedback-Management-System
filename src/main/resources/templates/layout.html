<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResolveIT - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <script>
        // Load theme
        const theme = localStorage.getItem("theme") || "system";

        if (theme === "dark" || 
           (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
        }

        function setTheme(mode) {
            localStorage.setItem("theme", mode);

            if (mode === "dark") {
                document.documentElement.classList.add("dark");
            } else if (mode === "light") {
                document.documentElement.classList.remove("dark");
            } else {
                // system
                if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
                    document.documentElement.classList.add("dark");
                } else {
                    document.documentElement.classList.remove("dark");
                }
            }
        }
    </script>
    <style>
        [th\:replace], [th\:fragment] { display: none; } /* Hide fragments in raw preview */
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-200">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-white dark:bg-gray-800 border-r dark:border-gray-700 flex flex-col flex-shrink-0">
            <div class="h-16 flex items-center px-6 border-b dark:border-gray-700">
                <a href="/" class="flex items-center gap-2 group">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold group-hover:scale-110 transition-transform">R</div>
                    <span class="text-xl font-bold tracking-tight">ResolveIT</span>
                </a>
            </div>
            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 px-2">Main Menu</div>
                
                <a th:href="@{/my-complaints(userId=${userId},token=${token})}" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    <span>Dashboard</span>
                </a>
                <a th:href="@{/my-complaints(userId=${userId},token=${token})}" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span>My Complaints</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    <span>Profile</span>
                </a>
            </nav>
            <div class="p-4 border-t dark:border-gray-700">
                <a href="/login" class="flex items-center gap-3 px-3 py-2 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <main class="flex-1 flex flex-col min-w-0 bg-gray-50 dark:bg-gray-900">
            <!-- Topbar -->
            <header class="h-16 flex items-center justify-between px-8 bg-white dark:bg-gray-800 border-b dark:border-gray-700 z-10 shadow-sm">
                <div class="text-sm font-medium text-gray-500 dark:text-gray-400">
                    SaaS Portal / <span class="text-gray-900 dark:text-white font-semibold" th:text="${pageTitle ?: 'Dashboard'}">Dashboard</span>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Theme Toggle -->
                    <div class="flex items-center gap-2">
                        <button onclick="setTheme('light')" class="px-2 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Light Mode">☀️</button>
                        <button onclick="setTheme('dark')" class="px-2 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Dark Mode">🌙</button>
                        <button onclick="setTheme('system')" class="px-2 py-1 border rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="System Preference">💻</button>
                    </div>
                    <!-- User Profile Dropdown Placeholder -->
                    <div class="flex items-center gap-3 border-l dark:border-gray-700 pl-4">
                        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold" th:text="${#strings.substring(userName, 0, 1) ?: 'U'}">U</div>
                        <span class="text-sm font-medium hidden sm:block" th:text="${userName ?: 'User'}">User</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="flex-1 overflow-y-auto p-6">
                <!-- Content Injector -->
                <div th:replace="${content}">
                    <!-- Page-specific content goes here -->
                </div>
            </div>
        </main>
    </div>
</body>
</html>
